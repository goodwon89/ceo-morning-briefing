<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="상상인그룹 CEO Morning Briefing — HR·AI·스타트업 뉴스">
<title>CEO Morning Briefing | 상상인그룹</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f0f0f5;
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    color: #1a1a1a;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 24px 16px 64px; }

  /* 헤더 */
  .header {
    background: #1a1a2e;
    border-radius: 18px;
    padding: 28px 32px 24px;
    margin-bottom: 16px;
    box-shadow: 0 4px 20px rgba(26,26,46,0.18);
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .logo-svg { display: block; margin-bottom: 12px; }
  .header-label {
    font-size: 10px; font-weight: 700; color: #4fc3a1;
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px;
  }
  .header-date { font-size: 12px; color: #888; }
  .btn-subscribe {
    display: inline-block; padding: 8px 18px;
    border: 1.5px solid #4fc3a1; border-radius: 22px;
    color: #4fc3a1; font-size: 12px; font-weight: 600;
    text-decoration: none; white-space: nowrap;
  }
  .btn-subscribe:hover { background: #4fc3a1; color: #fff; }

  /* 카드 */
  .card {
    background: #fff; border-radius: 16px; padding: 40px 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 16px;
    text-align: center;
  }
  .card-icon { font-size: 48px; margin-bottom: 20px; display: block; }
  .card h2 {
    font-size: 20px; font-weight: 800; color: #1a1a2e;
    letter-spacing: -0.4px; margin-bottom: 14px;
  }
  .card p { font-size: 15px; color: #555; line-height: 1.75; }
  .card .highlight { color: #1a7a5e; font-weight: 700; }
  .card .sub-note {
    font-size: 13px; color: #b0b0b0; margin-top: 20px;
    padding-top: 18px; border-top: 1px solid #f2f2f2;
  }

  /* 섹션 배지 미리보기 */
  .badges { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
  .badge {
    display: inline-block; background: #eefaf6; border-radius: 8px;
    padding: 5px 14px; font-size: 12px; font-weight: 700; color: #1a7a5e;
    letter-spacing: 0.2px;
  }

  /* 푸터 */
  .footer { text-align: center; padding: 20px 0 8px; }
  .footer-btns { margin-bottom: 14px; }
  .btn-fill {
    display: inline-block; padding: 11px 26px; background: #4fc3a1;
    border-radius: 22px; color: #fff; font-size: 14px; font-weight: 700;
    text-decoration: none; margin-right: 8px; letter-spacing: -0.2px;
    box-shadow: 0 2px 8px rgba(79,195,161,0.3);
  }
  .btn-fill:hover { background: #3aaf8d; }
  .btn-outline {
    display: inline-block; padding: 11px 26px; border: 1.5px solid #ddd;
    border-radius: 22px; color: #888; font-size: 14px; font-weight: 600;
    text-decoration: none; letter-spacing: -0.2px;
  }
  .footer-links { font-size: 12px; margin-bottom: 10px; }
  .footer-links a { color: #4fc3a1; text-decoration: none; margin: 0 10px; }
  .footer-links a:hover { text-decoration: underline; }
  .footer-sep { color: #ddd; }
  .footer-note { font-size: 11px; color: #c0c0c0; letter-spacing: 0.2px; }

  @media (max-width: 480px) {
    .header { padding: 22px 20px 18px; border-radius: 14px; }
    .card { padding: 28px 20px; border-radius: 14px; }
    .btn-fill, .btn-outline { padding: 10px 20px; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- 헤더 -->
  <div class="header">

      <div>

  <!-- 푸터 -->
  <div class="footer">
    <div class="footer-btns">
      <a href="mailto:jangkeunwon@gmail.com?subject=CEO%20Morning%20Briefing%20%EA%B5%AC%EB%8F%85%20%EC%8B%A0%EC%B2%AD&body=%EC%95%88%EB%85%95%ED%95%98%EC%84%B8%EC%9A%94%2C%0A%0ACEO%20Morning%20Briefing%20%EA%B5%AC%EB%8F%85%EC%9D%84%20%EC%8B%A0%EC%B2%AD%ED%95%A9%EB%8B%88%EB%8B%A4.%0A%0A%EC%9D%B4%EB%A9%94%EC%9D%BC%20%EC%A3%BC%EC%86%8C%3A%20"
         class="btn-fill">구독 신청</a>
      <a href="mailto:jangkeunwon@gmail.com?subject=CEO%20Morning%20Briefing%20%EA%B5%AC%EB%8F%85%20%EC%B7%A8%EC%86%8C&body=%EC%95%88%EB%85%95%ED%95%98%EC%84%B8%EC%9A%94%2C%0A%0ACEO%20Morning%20Briefing%20%EA%B5%AC%EB%8F%85%20%EC%B7%A8%EC%86%8C%EB%A5%BC%20%EC%9A%94%EC%B2%AD%ED%95%A9%EB%8B%88%EB%8B%A4.%0A%0A%EC%9D%B4%EB%A9%94%EC%9D%BC%20%EC%A3%BC%EC%86%8C%3A%20"

    <div class="footer-links">
